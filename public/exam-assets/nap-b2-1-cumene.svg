<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">Sơ đồ điều chế phenol từ benzene qua cumene</title>
  <desc id="desc">Sơ đồ benzene cộng propene tạo cumene, sau đó oxi hóa và phân cắt axit tạo phenol và acetone.</desc>
  <defs>
    <style>
      .label { font: 24px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 19px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .bold { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #2563eb; }
      .ring { fill: none; stroke: #111827; stroke-width: 3; }
      .bond { stroke: #111827; stroke-width: 3; stroke-linecap: round; fill: none; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrow); fill: none; }
      .dash { stroke-dasharray: 8 7; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#111827" />
    </marker>
  </defs>
  <g transform="translate(60,62)">
    <polygon class="ring" points="50,0 93,25 93,75 50,100 7,75 7,25" />
    <line class="bond" x1="20" y1="18" x2="50" y2="0" />
    <line class="bond" x1="80" y1="18" x2="80" y2="58" />
    <line class="bond" x1="20" y1="82" x2="50" y2="100" />
    <text x="50" y="138" text-anchor="middle" class="label">benzene</text>
  </g>
  <text x="185" y="95" class="label">+</text>
  <g transform="translate(218,82)">
    <line class="bond" x1="0" y1="30" x2="38" y2="30" />
    <line class="bond" x1="38" y1="30" x2="72" y2="12" />
    <line class="bond" x1="42" y1="36" x2="76" y2="18" />
  </g>
  <path class="arrow" d="M300 94 L430 94" />
  <text x="345" y="55" class="small">xt, t°, p</text>
  <text x="332" y="80" class="small">Hiệu suất</text>
  <text x="353" y="104" class="small">giai đoạn: 95%</text>
  <g transform="translate(465,38)">
    <polygon class="ring" points="50,0 93,25 93,75 50,100 7,75 7,25" />
    <line class="bond" x1="20" y1="18" x2="50" y2="0" />
    <line class="bond" x1="80" y1="18" x2="80" y2="58" />
    <line class="bond" x1="20" y1="82" x2="50" y2="100" />
    <line class="bond" x1="50" y1="0" x2="50" y2="-26" />
    <line class="bond" x1="50" y1="-26" x2="24" y2="-40" />
    <line class="bond" x1="50" y1="-26" x2="76" y2="-40" />
    <text x="50" y="140" text-anchor="middle" class="label">Cumene</text>
  </g>
  <path class="arrow" d="M572 94 L705 94" />
  <text x="632" y="43" class="small">1. O₂</text>
  <text x="623" y="68" class="small">2. H₂SO₄, t°</text>
  <text x="605" y="92" class="small">Hiệu suất</text>
  <text x="626" y="116" class="small">giai đoạn: h%</text>
  <g transform="translate(730,58)">
    <polygon class="ring" points="35,0 68,20 68,58 35,78 2,58 2,20" />
    <line class="bond" x1="10" y1="14" x2="35" y2="0" />
    <line class="bond" x1="58" y1="14" x2="58" y2="44" />
    <line class="bond" x1="10" y1="64" x2="35" y2="78" />
    <line class="bond" x1="35" y1="0" x2="35" y2="-20" />
    <text x="35" y="-28" text-anchor="middle" class="label">OH</text>
    <text x="35" y="118" text-anchor="middle" class="label">phenol</text>
  </g>
  <text x="860" y="98" class="label">+</text>
  <g transform="translate(890,74)">
    <line class="bond" x1="0" y1="16" x2="22" y2="16" />
    <line class="bond" x1="22" y1="16" x2="44" y2="16" />
    <line class="bond" x1="22" y1="16" x2="22" y2="-12" />
    <line class="bond" x1="28" y1="16" x2="28" y2="-12" />
    <text x="18" y="-22" class="label">O</text>
    <text x="5" y="64" text-anchor="middle" class="label">chất A</text>
  </g>
</svg>
