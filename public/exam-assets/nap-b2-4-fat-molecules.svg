      .db1 { stroke: #7c7c7c; stroke-width: 2; fill: none; }
      .label { font: 24px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .o { font: 22px 'Segoe UI', Arial, sans-serif; fill: #111827; }
    </style>
  </defs>
  <g transform="translate(70,60)">
