<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Do thi hieu suat tong hop ammonia</title>
  <desc id="desc">Do thi hieu suat tong hop ammonia theo ap suat voi cac duong cong 350 do C den 550 do C.</desc>
  <defs>
    <style>
      .axis { stroke: #111827; stroke-width: 4; stroke-linecap: round; }
