      .curve2 { stroke: #2563eb; stroke-width: 5; fill: none; stroke-dasharray: 12 10; }
      .curve3 { stroke: #334155; stroke-width: 5; fill: none; }
      .curve4 { stroke: #475569; stroke-width: 5; fill: none; stroke-dasharray: 7 7; }
      .curve5 { stroke: #64748b; stroke-width: 5; fill: none; stroke-dasharray: 3 8; }
      .text { font: 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .small { font: 20px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #2563eb; }
    </style>
  </defs>
  <text x="28" y="38" class="title">NAP 3 - Do thi hieu suat tong hop ammonia</text>
  <text x="120" y="92" class="text">N2(g) + 3H2(g) ⇌ 2NH3(g)</text>
  <text x="570" y="92" class="text">ΔrH°298 = -91,8 kJ</text>

