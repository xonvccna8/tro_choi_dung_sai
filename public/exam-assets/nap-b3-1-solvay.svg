<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">Sơ đồ quy trình Solvay</title>
  <desc id="desc">Sơ đồ quá trình Solvay từ nước muối bão hòa qua tháp carbonate hóa, làm lạnh lọc để thu NaHCO3 và nung thu Na2CO3.</desc>
  <defs>
    <style>
      .box { fill: #d6f0d6; stroke: #9bc59b; stroke-width: 2; rx: 12; }
      .text { font: 20px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .small { font: 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #374151; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151" />
    </marker>
  </defs>
  <g transform="translate(40,80)">
    <rect class="box" x="0" y="30" width="130" height="54" />
    <text x="65" y="55" text-anchor="middle" class="text">Nước muối</text>
    <text x="65" y="78" text-anchor="middle" class="text">bão hòa</text>

    <rect class="box" x="210" y="20" width="100" height="78" />
    <text x="260" y="55" text-anchor="middle" class="text">Tháp</text>
    <text x="260" y="80" text-anchor="middle" class="text">carbonate hóa</text>

    <rect class="box" x="460" y="20" width="160" height="78" />
    <text x="540" y="55" text-anchor="middle" class="text">Sản phẩm</text>
    <text x="540" y="80" text-anchor="middle" class="text">NaHCO₃(s)</text>

    <rect class="box" x="720" y="20" width="150" height="78" />
    <text x="795" y="55" text-anchor="middle" class="text">Sản phẩm</text>
    <text x="795" y="80" text-anchor="middle" class="text">Na₂CO₃(s)</text>

    <path class="arrow" d="M130 57 L210 57" />
    <path class="arrow" d="M310 57 L460 57" />
    <path class="arrow" d="M620 57 L720 57" />
    <text x="374" y="35" class="small">làm lạnh, lọc</text>
    <text x="650" y="44" class="small">t°</text>

    <path class="arrow dash" d="M770 20 L770 -35 L260 -35 L260 20" />
    <text x="522" y="-46" class="small">CO₂</text>
    <path class="arrow" d="M135 110 L210 110" />
    <text x="34" y="114" class="small">NH₃</text>
    <path class="arrow dash" d="M538 98 L538 146 L260 146 L260 98" />
    <text x="434" y="132" class="small">NH₄Cl(aq)</text>
  </g>
</svg>
