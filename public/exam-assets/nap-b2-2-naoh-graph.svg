    <text x="168" y="321" class="small">10</text>
    <text x="268" y="321" class="small">20</text>
    <text x="368" y="321" class="small">30</text>
    <text x="468" y="321" class="small">40</text>
    <text x="568" y="321" class="small">50</text>
    <text x="668" y="321" class="small">60</text>
