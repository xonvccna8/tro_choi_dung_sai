      <line x1="480" y1="300" x2="480" y2="40" />
      <line x1="580" y1="300" x2="580" y2="40" />
      <line x1="680" y1="300" x2="680" y2="40" />
      <line x1="80" y1="250" x2="720" y2="250" />
      <line x1="80" y1="200" x2="720" y2="200" />
      <line x1="80" y1="150" x2="720" y2="150" />
      <line x1="80" y1="100" x2="720" y2="100" />
      <line x1="80" y1="50" x2="720" y2="50" />
    </g>
    <path class="curve" d="M80 300 L94 269 L130 206 L180 161 L280 117 L380 86 L480 55 L680 15" />
    <circle class="point" cx="80" cy="300" r="6" />
    <circle class="point" cx="94" cy="269" r="6" />
    <circle class="point" cx="130" cy="206" r="6" />
    <circle class="point" cx="180" cy="161" r="6" />
    <circle class="point" cx="280" cy="117" r="6" />
    <circle class="point" cx="380" cy="86" r="6" />
    <circle class="point" cx="480" cy="55" r="6" />
    <circle class="point" cx="680" cy="15" r="6" />
