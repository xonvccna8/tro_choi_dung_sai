<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Đồ thị thay đổi khối lượng mẫu NaOH theo thời gian</title>
  <desc id="desc">Đồ thị biểu diễn khối lượng NaOH tăng dần theo thời gian tại các mốc 0, 1, 5, 10, 20, 30 và 60 phút.</desc>
  <defs>
    <style>
      .axis { stroke: #111827; stroke-width: 3; }
      .grid { stroke: #dbe4f0; stroke-width: 2; }
      .curve { stroke: #8b1e3f; stroke-width: 4; fill: none; }
      .point { fill: #8b1e3f; stroke: #f8fafc; stroke-width: 2; }
      .text { font: 21px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #2563eb; }
    </style>
  </defs>
  <text x="300" y="34" class="title">Đồ thị thay đổi khối lượng NaOH theo thời gian</text>
  <g transform="translate(120,50)">
