<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" role="img" aria-labelledby="title desc">
  <title id="title">Cong thuc cau tao Tyrosine</title>
  <desc id="desc">Cong thuc khung cua Tyrosine voi vong benzen co nhom OH, mach ben chua NH2 va COOH.</desc>
  <defs>
    <style>
      .bond { stroke: #111827; stroke-width: 5; stroke-linecap: round; }
      .thin { stroke-width: 3; }
      .label { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .atom { font: 32px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .accent { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #2563eb; }
    </style>
  </defs>
  <text x="36" y="44" class="accent">NAP 2 - Tyrosine</text>
  <g transform="translate(160,55)">
    <polygon points="110,20 180,60 180,140 110,180 40,140 40,60" fill="none" class="bond" />
    <line x1="110" y1="20" x2="180" y2="60" class="bond thin" />
    <line x1="180" y1="140" x2="110" y2="180" class="bond thin" />
    <line x1="40" y1="60" x2="40" y2="140" class="bond thin" />
    <line x1="40" y1="140" x2="0" y2="164" class="bond" />
    <text x="-42" y="184" class="label">HO</text>
    <line x1="180" y1="60" x2="240" y2="30" class="bond" />
    <line x1="240" y1="30" x2="300" y2="70" class="bond" />
    <line x1="300" y1="70" x2="360" y2="40" class="bond" />
    <line x1="300" y1="70" x2="300" y2="150" class="bond" />
    <text x="285" y="190" class="label">NH2</text>
    <line x1="360" y1="40" x2="430" y2="80" class="bond" />
    <line x1="430" y1="80" x2="430" y2="10" class="bond" />
    <line x1="446" y1="80" x2="446" y2="10" class="bond thin" />
    <text x="421" y="0" class="atom">O</text>
    <line x1="430" y1="80" x2="492" y2="110" class="bond" />
    <text x="500" y="120" class="label">OH</text>
  </g>
</svg>
